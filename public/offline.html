<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickStock ERP – אין חיבור לאינטרנט</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', 'Arial', sans-serif;
      background: #FAFAF8;
      color: #141414;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      background: #FACC15;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 48px;
      font-weight: 900;
      color: #141414;
      letter-spacing: -2px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #666;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FEF9C3;
      border: 1px solid #FACC15;
      color: #854D0E;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FACC15;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    button {
      background: #FACC15;
      color: #141414;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #EAB308; }
    .brand {
      margin-top: 48px;
      font-size: 12px;
      color: #aaa;
    }
    .brand span { color: #FACC15; font-weight: 700; }
  </style>
</head>
<body>
  <div class="icon-wrap">Q</div>
  <h1>אין חיבור לאינטרנט</h1>
  <p>QuickStock ERP דורש חיבור לרשת כדי לגשת לנתוני העסק שלך.</p>
  <div class="badge">
    <div class="dot"></div>
    ממתין לחיבור...
  </div>
  <button onclick="window.location.reload()">נסה שוב</button>
  <p class="brand"><span>Quick</span>Stock ERP</p>
</body>
</html>
