<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עדכון מוצרים קיימים - QuickStock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap');
  :root{
    --coral:#F5885E; --coral-dark:#E06B3F; --bg:#ECEDF0; --panel:#FFFFFF; --ink:#232326;
    --muted:#6B6E76; --line:#DCDEE3; --green:#3FA66A; --green-bg:#E6F6ED;
    --yellow-bg:#FFF6DE; --red-bg:#FDEBEA; --blue-bg:#E8F0FE; --blue:#2F5FD6;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:10;}
  header h1{font-size:16px;margin:0;font-weight:700;}
  header .sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .progress-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .progress-bar{width:140px;height:8px;background:var(--line);border-radius:5px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--coral);transition:width .25s;}
  .progress-text{font-size:12.5px;font-weight:600;white-space:nowrap;}
  .btn{background:var(--coral);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
  .btn:hover{background:var(--coral-dark);}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);}
  .btn.secondary:hover{background:#f4f4f6;}

  main{max-width:760px;margin:20px auto;padding:0 14px;}
  .card-main{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;gap:16px;align-items:center;}
  .card-main img{width:90px;height:90px;object-fit:cover;border-radius:10px;border:1px solid var(--line);flex-shrink:0;}
  .card-main .noimg{width:90px;height:90px;border-radius:10px;border:1px dashed var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);text-align:center;}
  .card-main .txt{flex:1;min-width:0;}
  .card-main .name{font-size:17px;font-weight:700;}
  .card-main .meta{font-size:12.5px;color:var(--muted);margin-top:5px;}
  .card-main .delbtn{font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;color:#B23B33;font-family:inherit;flex-shrink:0;}

  .search-wrap{margin-top:14px;position:relative;}
  .search-wrap input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13.5px;}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;}

  .cand-list{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
  .cand-row{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .cand-row:hover{border-color:var(--coral);box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .cand-row .cname{font-size:13px;font-weight:600;}
  .cand-row .cmeta{font-size:11px;color:var(--muted);margin-top:2px;}
  .cand-row .score{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0;}
  .tag-green{background:var(--green-bg);color:#1F7A46;}
  .tag-yellow{background:var(--yellow-bg);color:#8A6B0E;}
  .tag-red{background:var(--red-bg);color:#B23B33;}

  .edit-panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px;}
  .edit-panel h3{font-size:13px;margin:0 0 10px;font-weight:700;color:var(--green);}
  .edit-row{display:flex;gap:8px;align-items:center;margin-bottom:9px;}
  .edit-row label{font-size:12px;color:var(--muted);width:78px;flex-shrink:0;}
  .edit-row input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;}
  .edit-actions{display:flex;gap:8px;margin-top:14px;}

  footer{background:var(--panel);border-top:1px solid var(--line);padding:10px 18px;font-size:11.5px;color:var(--muted);text-align:center;margin-top:30px;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>
<header>
  <div>
    <h1>עדכון מוצרים קיימים — QuickStock</h1>
    <div class="sub">עוברים על כל מוצר עם תמונה, אחד־אחד: מחפשים, ממלאים שם/מק"ט/ברקוד/מחיר, מאשרים</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0/659</div>
    <button class="btn secondary" id="importBtn">טען קובץ קודם</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="btn" id="exportBtn">ייצוא תוצאות</button>
  </div>
</header>

<main id="mainArea"></main>

<footer>כל 15-20 מוצרים — לחץ "ייצוא תוצאות" ושלח את הקובץ בצ'אט.</footer>

<script>
(function(){
  const oldItems = TOOL_DATA.old.map(o => ({...o}));
  const oldById = Object.fromEntries(oldItems.map(o=>[o.id,o]));
  const ourItems = TOOL_DATA.our;
  const ourBySku = Object.fromEntries(ourItems.map(n=>[n.sku,n]));
  const usedSkus = new Set();

  let queue = oldItems.map(o=>o.id);
  let qIndex = 0;
  let history = [];
  let reviewId = null;
  let skippedMode = false;
  let searchTerm = '';
  let selectedCandidateSku = null;

  const mainArea = document.getElementById('mainArea');

  function esc(s){ const d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
  function attr(s){ return esc(s).replace(/"/g,'&quot;'); }
  function fmtMoney(v){ if(v===null||v===undefined||v==='null'||v==='') return '-'; const n=parseFloat(v); return isNaN(n)?'-':n.toFixed(2); }
  function fmtQty(v){ if(v===null||v===undefined||v==='null'||v==='') return '0'; return v; }
  function scoreClass(score){ return score>=0.8?'tag-green':(score>=0.6?'tag-yellow':'tag-red'); }

  function updateProgress(){
    const total = oldItems.filter(o=>o.status!=='deleted').length;
    const done = oldItems.filter(o=>o.status==='done').length;
    const skippedCount = oldItems.filter(o=>o.status==='skipped').length;
    document.getElementById('progressFill').style.width = (done/total*100).toFixed(1)+'%';
    document.getElementById('progressText').textContent = done+'/'+total;
    let bar = document.getElementById('skipBar');
    if(!bar){
      bar = document.createElement('div');
      bar.id = 'skipBar';
      bar.style.cssText = 'max-width:760px;margin:10px auto 0;display:flex;gap:8px;justify-content:flex-end;padding:0 14px;';
      document.querySelector('header').insertAdjacentElement('afterend', bar);
    }
    bar.innerHTML = `
      <button class="btn secondary" id="backBtn" ${history.length<2 && !reviewId ? 'disabled style="opacity:.4;cursor:not-allowed;"':''}>⬅ הקודם</button>
      <button class="btn secondary" id="skippedBtn">📌 דילגתי (${skippedCount})</button>
      ${skippedMode || reviewId ? `<button class="btn" id="backToWorkBtn">🔙 חזרה לעבודה רגילה</button>` : ''}
    `;
    document.getElementById('backBtn').addEventListener('click', goBack);
    document.getElementById('skippedBtn').addEventListener('click', openSkippedQueue);
    const bw = document.getElementById('backToWorkBtn');
    if(bw) bw.addEventListener('click', backToNormalWork);
  }

  function goBack(){
    if(history.length < 2) return;
    history.pop();
    reviewId = history[history.length-1];
    selectedCandidateSku = null;
    searchTerm = '';
    render();
  }

  function openSkippedQueue(){
    const skippedIds = oldItems.filter(o=>o.status==='skipped').map(o=>o.id);
    if(!skippedIds.length){ alert('אין פריטים שדילגת עליהם'); return; }
    skippedMode = true;
    queue = skippedIds;
    qIndex = 0;
    reviewId = null;
    selectedCandidateSku = null;
    searchTerm = '';
    render();
  }

  function backToNormalWork(){
    skippedMode = false;
    reviewId = null;
    queue = oldItems.map(o=>o.id);
    qIndex = 0;
    selectedCandidateSku = null;
    searchTerm = '';
    render();
  }

  function advance(){
    selectedCandidateSku = null;
    searchTerm = '';
    if(skippedMode){
      queue = oldItems.filter(o=>o.status==='skipped').map(o=>o.id);
      qIndex = 0;
    } else {
      qIndex++;
    }
    render();
  }

  function currentOld(){
    if(reviewId) return oldById[reviewId];
    const wantStatus = skippedMode ? 'skipped' : 'pending';
    while(qIndex < queue.length){
      const o = oldById[queue[qIndex]];
      if(o && o.status===wantStatus) return o;
      qIndex++;
    }
    return null;
  }

  function confirmMatch(o, sku, editedFields){
    if(o.chosen && o.chosen.sku) usedSkus.delete(o.chosen.sku);
    o.status = 'done';
    o.chosen = {
      name: editedFields.name,
      sku: editedFields.sku,
      barcode: editedFields.barcode,
      buy_price: editedFields.buy_price,
    };
    usedSkus.add(sku);
  }

  function render(){
    const o = currentOld();
    updateProgress();
    if(!o){
      mainArea.innerHTML = skippedMode
        ? `<div class="empty-state">🎉 עברת על כל המדולגים!<br><span style="font-size:12px;">אפשר לחזור לעבודה רגילה למעלה.</span></div>`
        : `<div class="empty-state">🎉 עברת על כל 659 המוצרים!<br><span style="font-size:12px;">בדוק את "📌 דילגתי" אם נשארו פריטים שם.</span></div>`;
      return;
    }

    if(!reviewId && !skippedMode && (history.length===0 || history[history.length-1] !== o.id)){
      history.push(o.id);
    }

    let candHtml = '';
    if(selectedCandidateSku){
      const our = ourBySku[selectedCandidateSku];
      candHtml = `
        <div class="edit-panel">
          <h3>✔ נבחר: ${esc(our.name)} — ערוך אם צריך ואז אשר</h3>
          <div class="edit-row"><label>שם:</label><input type="text" id="editName" value="${attr(our.name)}"></div>
          <div style="display:flex;gap:6px;margin:-4px 0 9px 86px;">
            <button type="button" class="btn secondary" style="font-size:11px;padding:4px 9px;" id="fillOldNameBtn">שם קיים במערכת: ${esc(o.name)}</button>
            <button type="button" class="btn secondary" style="font-size:11px;padding:4px 9px;" id="fillNewNameBtn">שם חדש: ${esc(our.name)}</button>
          </div>
          <div class="edit-row"><label>מק"ט:</label><input type="text" id="editSku" value="${attr(our.sku)}"></div>
          <div class="edit-row"><label>ברקוד:</label><input type="text" id="editBarcode" value="${attr(our.barcode||'')}"></div>
          <div class="edit-row"><label>מחיר עלות:</label><input type="text" id="editPrice" value="${attr(our.buy_price??'')}"></div>
          <div class="edit-actions">
            <button class="btn" id="confirmBtn">✔ אשר והמשך</button>
            <button class="btn secondary" id="cancelSelectBtn">בטל בחירה</button>
          </div>
        </div>`;
    } else {
      const term = searchTerm.trim();
      let results = [];
      if(term){
        results = ourItems.filter(n => !usedSkus.has(n.sku) && (n.name.includes(term) || (n.sku && n.sku.includes(term)))).slice(0,30);
      } else if(o.candidates && o.candidates.length){
        results = o.candidates.map(c => ourBySku[c.sku]).filter(n => n && !usedSkus.has(n.sku));
      }
      candHtml = `
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="🔍 חפש מוצר מהרשימה שלנו (שם או מק&quot;ט)..." value="${attr(searchTerm)}">
          <div class="hint">${term ? results.length+' תוצאות (מוצרים שכבר נבחרו לא מוצגים)' : (o.candidates&&o.candidates.length ? 'הצעות אוטומטיות (לא מחייב):' : 'הקלד לחיפוש — אין הצעה אוטומטית למוצר הזה')}</div>
        </div>
        <div class="cand-list">
          ${results.map(n=>{
            const scoreObj = (!term && o.candidates) ? o.candidates.find(c=>c.sku===n.sku) : null;
            return `<div class="cand-row" data-sku="${attr(n.sku)}">
              <div>
                <div class="cname">${esc(n.name)}</div>
                <div class="cmeta">מק"ט: ${esc(n.sku)} · ₪${fmtMoney(n.buy_price)} · כמות ${fmtQty(n.qty)}${n.barcode?(' · ברקוד '+esc(n.barcode)):''}</div>
              </div>
              ${scoreObj ? `<span class="score ${scoreClass(scoreObj.score)}">${Math.round(scoreObj.score*100)}%</span>` : ''}
            </div>`;
          }).join('') || (term ? '<div style="text-align:center;color:var(--muted);font-size:12.5px;padding:14px;">אין תוצאות</div>' : '')}
        </div>`;
    }

    const reviewBanner = reviewId ? `<div style="background:var(--blue-bg);color:var(--blue);font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px;text-align:center;">👀 מצב סקירה — אתה בודק פריט קודם. שינוי ואישור יעדכן אותו.</div>` : '';
    const currentChosen = o.status==='done' && o.chosen ? `<div style="background:var(--green-bg);color:#1F7A46;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px;">✔ נבחר כרגע: ${esc(o.chosen.name)} (מק"ט ${esc(o.chosen.sku||'-')})</div>` : '';

    mainArea.innerHTML = reviewBanner + currentChosen + `
      <div class="card-main">
        ${o.image && o.image!=='null' ? `<img src="${esc(o.image)}" loading="lazy" onerror="this.style.display='none'">` : `<div class="noimg">אין<br>תמונה</div>`}
        <div class="txt">
          <div class="name">${esc(o.name)}</div>
          <div class="meta">מק"ט נוכחי: ${o.sku?esc(o.sku):'-'} · מחיר נוכחי: ₪${fmtMoney(o.buy_price)} · כמות: ${fmtQty(o.qty)}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
          <button class="delbtn" id="delBtn">🗑 לא רלוונטי</button>
          ${!reviewId ? `<button class="delbtn" id="skipBtn" style="color:var(--blue);">⏭ דלג</button>` : ''}
        </div>
      </div>
      ${candHtml}
    `;

    document.getElementById('delBtn').addEventListener('click', ()=>{
      if(o.chosen && o.chosen.sku) usedSkus.delete(o.chosen.sku);
      o.status = 'deleted';
      if(reviewId){ reviewId=null; render(); } else advance();
    });
    const skipBtn = document.getElementById('skipBtn');
    if(skipBtn) skipBtn.addEventListener('click', ()=>{
      o.status = 'skipped';
      advance();
    });

    if(selectedCandidateSku){
      const our = ourBySku[selectedCandidateSku];
      document.getElementById('confirmBtn').addEventListener('click', ()=>{
        const fields = {
          name: document.getElementById('editName').value,
          sku: document.getElementById('editSku').value,
          barcode: document.getElementById('editBarcode').value,
          buy_price: document.getElementById('editPrice').value,
        };
        confirmMatch(o, selectedCandidateSku, fields);
        if(reviewId){ reviewId=null; render(); } else advance();
      });
      document.getElementById('cancelSelectBtn').addEventListener('click', ()=>{
        selectedCandidateSku = null;
        render();
      });
      document.getElementById('fillOldNameBtn').addEventListener('click', ()=>{
        document.getElementById('editName').value = o.name;
      });
      document.getElementById('fillNewNameBtn').addEventListener('click', ()=>{
        document.getElementById('editName').value = our.name;
      });
    } else {
      const input = document.getElementById('searchInput');
      input.addEventListener('input', e=>{
        const cursorPos = e.target.selectionStart;
        searchTerm = e.target.value;
        render();
        const ni = document.getElementById('searchInput');
        if(ni){ ni.focus(); try{ ni.setSelectionRange(cursorPos,cursorPos); }catch(err){} }
      });
      mainArea.querySelectorAll('.cand-row').forEach(row=>{
        row.addEventListener('click', ()=>{ selectedCandidateSku = row.dataset.sku; render(); });
      });
    }
  }

  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const done = oldItems.filter(o=>o.status==='done').map(o=>({ id:o.id, sku:o.sku, chosen:o.chosen }));
    const deleted = oldItems.filter(o=>o.status==='deleted').map(o=>({ id:o.id }));
    const skipped = oldItems.filter(o=>o.status==='skipped').map(o=>({ id:o.id }));
    const pending = oldItems.filter(o=>o.status==='pending').map(o=>({ id:o.id }));
    const payload = { done, deleted, skipped, pending, exported_at:new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload,null,1)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='simple_progress_'+new Date().toISOString().slice(0,16).replace(/[:T]/g,'-')+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  });

  document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const payload = JSON.parse(ev.target.result);
        (payload.done||[]).forEach(d=>{ const o=oldById[d.id]; if(o){ o.status='done'; o.chosen=d.chosen; if(d.chosen && d.chosen.sku) usedSkus.add(d.chosen.sku); } });
        (payload.deleted||[]).forEach(d=>{ const o=oldById[d.id]; if(o) o.status='deleted'; });
        (payload.skipped||[]).forEach(d=>{ const o=oldById[d.id]; if(o) o.status='skipped'; });
        queue = oldItems.map(o=>o.id);
        qIndex = 0;
        history = [];
        reviewId = null;
        skippedMode = false;
        render();
        alert('נטען בהצלחה: '+(payload.done||[]).length+' הושלמו, '+(payload.deleted||[]).length+' לא רלוונטי, '+(payload.skipped||[]).length+' דילוגים');
      }catch(err){ alert('שגיאה: '+err.message); }
    };
    reader.readAsText(file);
  });

  render();
})();

</script>
</body>
</html>
