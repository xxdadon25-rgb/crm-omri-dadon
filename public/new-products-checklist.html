<script>
(function(){
  const selected = new Set();
  let searchTerm = '';
  const listArea = document.getElementById('listArea');
  const counterBadge = document.getElementById('counterBadge');

  function esc(s){ const d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
  function fmtMoney(v){ if(v===null||v===undefined||v==='null'||v==='') return '-'; const n=parseFloat(v); return isNaN(n)?'-':n.toFixed(2); }
  function fmtQty(v){ if(v===null||v===undefined||v==='null'||v==='') return '0'; return v; }

  function render(){
    const term = searchTerm.trim();
    let items = ITEMS;
    if(term) items = items.filter(n => n.name.includes(term) || (n.sku && n.sku.includes(term)));
    listArea.innerHTML = items.map(n => `
      <div class="item ${selected.has(n.sku)?'selected':''}" data-sku="${esc(n.sku)}">
        <div><div class="name">${esc(n.name)}</div><div class="meta">מק"ט: ${esc(n.sku)} · מחיר עלות: ₪${fmtMoney(n.buy_price)} · כמות: ${fmtQty(n.qty)}</div></div>
        <div class="check">${selected.has(n.sku)?'✔':''}</div>
      </div>
    `).join('') || '<div style="text-align:center;color:var(--muted);padding:20px;">אין תוצאות</div>';
    listArea.querySelectorAll('.item').forEach(row=>{
      row.addEventListener('click', ()=>{
        const sku = row.dataset.sku;
        if(selected.has(sku)) selected.delete(sku); else selected.add(sku);
        render();
      });
    });
    counterBadge.textContent = selected.size + ' נבחרו';
  }

  document.getElementById('searchInput').addEventListener('input', e=>{ searchTerm = e.target.value; render(); });

  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const chosen = ITEMS.filter(n => selected.has(n.sku));
    const blob = new Blob([JSON.stringify({ selected: chosen, exported_at: new Date().toISOString() }, null, 1)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'new_products_selection_' + new Date().toISOString().slice(0,16).replace(/[:T]/g,'-') + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  });

  document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const payload = JSON.parse(ev.target.result);
        (payload.selected||[]).forEach(n=> selected.add(n.sku));
        render();
        alert('נטען: ' + (payload.selected||[]).length + ' נבחרו');
      }catch(err){ alert('שגיאה: ' + err.message); }
    };
    reader.readAsText(file);
  });

  render();
})();
</script>
