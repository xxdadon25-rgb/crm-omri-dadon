<!DOCTYPE html>
<!--
  Run this file in a browser to generate PNG icons from the SVG source.
  Open it locally and use the download buttons.
  Place the downloaded files in this folder as icon-192.png, icon-512.png, icon-maskable-512.png
-->
<html>
<head><title>Icon Generator</title></head>
<body style="font-family:sans-serif;padding:24px;background:#f5f5f5">
<h2>QuickStock ERP – Icon Generator</h2>
<p>Click each button to download the icon at the correct size.</p>

<div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:24px">
  <div>
    <canvas id="c192" width="192" height="192" style="border-radius:40px;display:block;margin-bottom:8px"></canvas>
    <button onclick="download('c192','icon-192.png')">Download icon-192.png</button>
  </div>
  <div>
    <canvas id="c512" width="512" height="512" style="border-radius:112px;display:block;margin-bottom:8px"></canvas>
    <button onclick="download('c512','icon-512.png')">Download icon-512.png</button>
  </div>
  <div>
    <canvas id="cm512" width="512" height="512" style="display:block;margin-bottom:8px"></canvas>
    <button onclick="download('cm512','icon-maskable-512.png')">Download icon-maskable-512.png</button>
  </div>
</div>

<script>
function drawIcon(id, size, padding) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const r = size * 0.21; // border radius
  // Background
  ctx.fillStyle = '#FACC15';
  if (!padding) {
    roundRect(ctx, 0, 0, size, size, r);
  } else {
    ctx.fillRect(0, 0, size, size);
  }
  ctx.fill();
  // Q letter
  ctx.fillStyle = '#141414';
  ctx.font = `900 ${size * 0.52}px Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Q', size / 2, size / 2 + size * 0.03);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function download(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}

drawIcon('c192', 192, false);
drawIcon('c512', 512, false);
drawIcon('cm512', 512, true); // maskable: full bleed background
</script>
</body>
</html>
